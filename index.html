<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f6efe2" />
<title>Charlie &amp; Avery Scribbles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6efe2; --ink:#3a3026; --ink-soft:#6f6354;
    --crayon-red:#e2574c; --crayon-blue:#3f7cac; --crayon-yellow:#f0b429;
    --crayon-green:#5aa469; --crayon-purple:#8a6ab0; --stage:#fbf7ee;
    --shadow:rgba(58,48,38,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
       background:var(--paper);overflow:hidden;position:fixed;inset:0;
       display:flex;flex-direction:column}

  /* ---- branded top bar ---- */
  .bar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
       gap:12px;padding:9px 16px;background:var(--stage);
       border-bottom:2.5px solid var(--ink);box-shadow:0 3px 0 var(--shadow);z-index:2}
  .brand{font-family:'Fredoka';font-weight:700;font-size:clamp(17px,4.5vw,22px);
         display:flex;align-items:center;gap:8px;letter-spacing:-.3px;white-space:nowrap}
  .brand .a{color:var(--crayon-red)} .brand .b{color:var(--crayon-blue)}
  .brand .c{color:var(--crayon-green)} .brand .d{color:var(--crayon-yellow)}
  .brand .e{color:var(--crayon-purple)}
  .brand .mask{font-size:1.15em;transform:rotate(-6deg);display:inline-block}
  .full{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--ink);
        background:var(--paper);border:2px solid var(--ink);border-radius:12px;
        padding:7px 13px;box-shadow:2px 3px 0 var(--shadow);cursor:pointer;
        text-decoration:none;white-space:nowrap}
  .full:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--shadow)}

  /* ---- stage / iframe ---- */
  .stage{flex:1;position:relative;min-height:0}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff}

  /* loading splash over iframe until it loads */
  .splash{position:absolute;inset:0;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:18px;background:var(--paper);
          transition:opacity .4s ease}
  .splash.gone{opacity:0;pointer-events:none}
  .loader{width:84px;height:84px;position:relative}
  .loader span{position:absolute;inset:0;border-radius:50%;border:5px solid transparent}
  .loader span:nth-child(1){border-top-color:var(--crayon-red);animation:spin 1s linear infinite}
  .loader span:nth-child(2){border-right-color:var(--crayon-blue);animation:spin 1.4s linear infinite reverse}
  .loader span:nth-child(3){inset:15px;border-bottom-color:var(--crayon-green);animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .splash p{font-family:'Fredoka';font-weight:600;font-size:18px;color:var(--ink-soft);margin:0}

  /* fallback if the embed misbehaves */
  .fallback{position:absolute;left:0;right:0;bottom:0;padding:10px 14px;
            background:var(--stage);border-top:2px solid var(--ink);
            font-family:'Fredoka';font-weight:500;font-size:13px;color:var(--ink-soft);
            display:flex;align-items:center;justify-content:center;gap:6px;text-align:center}
  .fallback a{color:var(--crayon-blue);font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><span class="mask">🎭</span>
      <span><span class="a">Charlie</span> <span class="b">&amp;</span> <span class="c">Avery</span> <span class="d">Scribbles</span></span>
    </div>
    <a class="full" id="full" href="https://sketch.metademolab.com/" target="_blank" rel="noopener">Full screen ↗</a>
  </div>

  <div class="stage">
    <iframe id="frame"
      src="https://sketch.metademolab.com/"
      allow="camera; microphone; clipboard-read; clipboard-write; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"></iframe>

    <div class="splash" id="splash">
      <div class="loader"><span></span><span></span><span></span></div>
      <p>Setting up the stage…</p>
    </div>

    <div class="fallback">
      Stuck? <a href="https://sketch.metademolab.com/" target="_blank" rel="noopener">Open it full screen ↗</a>
    </div>
  </div>

<script>
  var frame = document.getElementById('frame');
  var splash = document.getElementById('splash');
  // hide splash once the embed loads (or after a timeout as a safety net)
  frame.addEventListener('load', function(){ splash.classList.add('gone'); });
  setTimeout(function(){ splash.classList.add('gone'); }, 6000);
</script>
</body>
</html>
